<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>FamilyNest Shared</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>

:root {
  color-scheme: light dark;
  --bg:#f7f4ee;
  --card:#fffdf9;
  --card2:#efe7da;
  --ink:#221f1b;
  --muted:#6f665b;
  --line:#ddd3c4;
  --green:#2f6f4e;
  --greenSoft:#d9eadf;
  --red:#a94332;
  --redSoft:#f5ddd8;
  --yellow:#8a6500;
  --yellowSoft:#fff0bf;
  --blue:#315f7a;
  --blueSoft:#dceaf1;
  --orange:#b85c00;
  --orangeSoft:#fde8cc;
  --shadow:0 16px 40px rgba(49,39,25,.10);
  font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg:#1a1917;
    --card:#242019;
    --card2:#2e2820;
    --ink:#f0ece4;
    --muted:#a09588;
    --line:#3a3530;
    --green:#5aad82;
    --greenSoft:#1a3328;
    --red:#e07060;
    --redSoft:#3a1a15;
    --yellow:#d4a040;
    --yellowSoft:#2e2200;
    --blue:#6aadcc;
    --blueSoft:#142230;
    --orange:#e07a30;
    --orangeSoft:#2e1800;
    --shadow:0 16px 40px rgba(0,0,0,.25);
  }
}
* { box-sizing:border-box; }
body { margin:0; background:var(--bg); color:var(--ink); min-height:100vh; }
button, input, select, textarea { font:inherit; }
button {
  border:0; border-radius:10px; padding:.7rem 1rem;
  background:var(--ink); color:var(--card); font-weight:900; cursor:pointer;
}
button.secondary { background:var(--card2); color:var(--ink); border:1px solid var(--line); }
button.ghost { background:transparent; color:var(--ink); border:1px solid var(--line); }
button.small { padding:.35rem .55rem; border-radius:8px; font-size:.82rem; }
button.danger { background:var(--red); color:#fff; }
input, select, textarea {
  width:100%; border:1px solid var(--line); border-radius:10px;
  background:var(--card); color:var(--ink); padding:.7rem .8rem; min-height:2.5rem;
}
input[type="checkbox"] { width:auto; min-height:auto; accent-color:var(--green); }
label { display:grid; gap:.35rem; color:var(--muted); font-weight:850; font-size:.83rem; }
.app-shell { min-height:100vh; }
.header {
  position:sticky; top:0; z-index:10; background:color-mix(in srgb, var(--card) 94%, transparent);
  border-bottom:1px solid var(--line); backdrop-filter:blur(10px);
}
.header-inner { max-width:1320px; margin:0 auto; padding:.85rem 1rem; display:grid; gap:.75rem; }
.brand-row { display:flex; justify-content:space-between; gap:1rem; align-items:center; flex-wrap:wrap; }
.brand { display:flex; gap:.75rem; align-items:center; }
.logo { width:2.3rem; height:2.3rem; display:grid; place-items:center; background:var(--green); color:white; border-radius:10px; font-weight:950; }
.brand h1 { margin:0; font-size:1.15rem; }
.brand p { margin:.1rem 0 0; color:var(--muted); font-size:.82rem; }
.nav { display:flex; gap:.4rem; overflow:auto; padding-bottom:.1rem; }
.nav button { white-space:nowrap; background:transparent; color:var(--muted); border:1px solid transparent; }
.nav button.active { background:var(--greenSoft); color:var(--green); border-color:var(--green); }
.main { max-width:1320px; margin:0 auto; padding:1rem; display:grid; gap:1rem; }
.topbar { display:flex; justify-content:space-between; gap:1rem; align-items:flex-start; flex-wrap:wrap; }
.topbar h2 { margin:0; font-size:clamp(1.45rem,3vw,2.2rem); }
.topbar p { margin:.25rem 0 0; color:var(--muted); line-height:1.45; }
.toolbar { display:flex; gap:.5rem; flex-wrap:wrap; align-items:end; }
.card { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:1rem; box-shadow:var(--shadow); }
.cards { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:.85rem; }
.metric .label { color:var(--muted); text-transform:uppercase; letter-spacing:.04em; font-size:.78rem; font-weight:950; }
.metric .value { font-size:2rem; font-weight:950; margin-top:.4rem; line-height:1; }
.metric .hint { color:var(--muted); margin-top:.5rem; line-height:1.35; }
.metric .value.red { color:var(--red); }
.metric .value.green { color:var(--green); }
.section-title { display:flex; justify-content:space-between; align-items:center; gap:1rem; margin-bottom:.75rem; }
.section-title h3 { margin:0; }
.section-title span { color:var(--muted); }
.grid { display:grid; gap:1rem; }
.split { display:grid; grid-template-columns:minmax(0,1.2fr) minmax(20rem,.8fr); gap:1rem; }
.table-wrap { overflow:auto; border:1px solid var(--line); border-radius:12px; background:var(--card); }
table { width:100%; min-width:760px; border-collapse:collapse; }
th, td { border-bottom:1px solid var(--line); text-align:left; padding:.65rem .75rem; vertical-align:middle; font-size:.9rem; }
th { color:var(--muted); text-transform:uppercase; letter-spacing:.04em; font-size:.76rem; background:var(--bg); position:sticky; top:0; z-index:1; }
td.money, th.money { text-align:right; white-space:nowrap; }
.pill { display:inline-flex; align-items:center; border-radius:999px; padding:.22rem .55rem; background:var(--card2); color:var(--muted); font-weight:900; font-size:.76rem; white-space:nowrap; }
.pill.green { background:var(--greenSoft); color:var(--green); }
.pill.red { background:var(--redSoft); color:var(--red); }
.pill.yellow { background:var(--yellowSoft); color:var(--yellow); }
.pill.blue { background:var(--blueSoft); color:var(--blue); }
.pill.orange { background:var(--orangeSoft); color:var(--orange); }
.banner { border:1px solid var(--orange); background:var(--orangeSoft); color:var(--orange); border-radius:12px; padding:.85rem 1rem; display:flex; gap:.75rem; align-items:center; }
.banner strong { display:block; }
.empty { color:var(--muted); border:1px dashed var(--line); border-radius:12px; padding:1rem; background:var(--bg); }
.form-grid { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:.75rem; align-items:end; }
.form-grid .wide { grid-column:span 2; }
.login-wrap { min-height:100vh; display:grid; place-items:center; padding:1rem; }
.login-card { width:min(520px,100%); }
.login-card h1 { margin:.3rem 0; }
.login-card p { color:var(--muted); line-height:1.45; }
.error { color:var(--red); font-weight:850; }
.good { color:var(--green); font-weight:850; }
.small-muted { color:var(--muted); font-size:.82rem; line-height:1.35; }
.mobile-card-list { display:none; }
.bill-card { display:grid; gap:.5rem; border:1px solid var(--line); border-radius:12px; padding:.85rem; background:var(--card); }
.bill-card .top { display:flex; justify-content:space-between; gap:.75rem; align-items:flex-start; }
.bill-card h4 { margin:0; }
.bill-card p { margin:0; color:var(--muted); }
@media (max-width: 950px) {
  .cards { grid-template-columns:repeat(2,minmax(0,1fr)); }
  .split { grid-template-columns:1fr; }
  .form-grid { grid-template-columns:1fr 1fr; }
}
@media (max-width: 680px) {
  .main { padding:.75rem; }
  .cards { grid-template-columns:1fr; }
  .form-grid { grid-template-columns:1fr; }
  .form-grid .wide { grid-column:auto; }
  .desktop-table-mobile-cards .table-wrap { display:none; }
  .desktop-table-mobile-cards .mobile-card-list { display:grid; gap:.75rem; }
  .brand-row { display:grid; }
}

  </style>
</head>
<body>
  <div id="app">
    <div class="login-wrap">
      <div class="card login-card">
        <div class="logo">FN</div>
        <h1>FamilyNest</h1>
        <p>Loading app…</p>
      </div>
    </div>
  </div>
  <script>

const SUPABASE_URL = "https://nssdfhkzjoanbzgpilvz.supabase.co";
const SUPABASE_KEY = "sb_publishable_lKxKwLXa09lnEBK8acwwNg_hmCB3DFc";
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
console.log("FamilyNest Supabase v2 loaded");
window.addEventListener("error", event => {
  console.error("FamilyNest page error:", event.error || event.message);
});

const app = document.getElementById("app");
const money = new Intl.NumberFormat("en-US", { style: "currency", currency: "USD" });

const navItems = [
  ["dashboard", "Dashboard"],
  ["monthly", "Monthly Plan"],
  ["keep", "Keep in Account"],
  ["income", "Income"],
  ["personal", "Personal Money"],
  ["transactions", "Transactions"],
  ["debt", "Debt"]
];

let state = {
  session: null,
  profile: null,
  householdId: null,
  settings: null,
  activeView: "dashboard",
  activeMonth: "2026-07",
  months: [],
  budgetLines: [],
  transactions: [],
  incomeLines: [],
  quarterlyIncome: [],
  sideHustles: [],
  personalLimits: [],
  debts: [],
  keepAssumptions: []
};

function escapeHtml(value) {
  return String(value ?? "").replace(/[&<>"']/g, ch => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#039;" }[ch]));
}
function sum(items, getter) {
  return items.reduce((total, item) => total + Number(getter(item) || 0), 0);
}
function fmt(n) {
  return money.format(Number(n || 0));
}
function monthNumber(monthKey) {
  const match = String(monthKey || "").match(/-(\d{2})$/);
  return match ? Number(match[1]) : new Date().getMonth() + 1;
}
function monthLabel(monthKey) {
  return state.months.find(m => m.month_key === monthKey)?.label || monthKey;
}
function isQuarterlyActive(row, monthKey = state.activeMonth) {
  const m = monthNumber(monthKey);
  const raw = String(row.months_counted || "1,4,7,10");
  const nums = raw.split(/[^0-9]+/).map(x => Number(x)).filter(Boolean);
  return nums.includes(m);
}
function activeBudgetLines(monthKey = state.activeMonth) {
  return state.budgetLines.filter(row => row.month_key === monthKey);
}
function activeTransactions(monthKey = state.activeMonth) {
  return state.transactions.filter(row => row.month_key === monthKey);
}
function activeSideHustles(monthKey = state.activeMonth) {
  return state.sideHustles.filter(row => row.month_key === monthKey);
}
function reliableIncome() {
  return sum(state.incomeLines.filter(r => r.active !== false), r => r.monthly_amount);
}
function quarterlyIncomeActive() {
  return sum(state.quarterlyIncome.filter(r => r.active !== false && isQuarterlyActive(r)), r => r.amount);
}
function totalPlanBills() {
  return sum(activeBudgetLines().filter(r => !isPlaceholderBill(r)), r => r.amount);
}
function paidBills() {
  return sum(activeBudgetLines(), r => r.paid_amount);
}
function personalLimitTotal() {
  return sum(state.personalLimits.filter(r => r.month_key === state.activeMonth), r => r.monthly_limit);
}
function personalSpent(owner = null) {
  return Math.abs(sum(activeTransactions().filter(t => {
    return Number(t.amount) < 0 && t.category === "Personal" && (!owner || t.owner === owner) && t.reconciled;
  }), t => t.amount));
}
function paypalGrossMonth() {
  return sum(activeSideHustles(), r => r.gross_amount);
}
function paypalSetAsideMonth() {
  return sum(activeSideHustles(), r => r.recommended_set_aside || (Number(r.gross_amount || 0) * Number(r.tax_rate || 30) / 100));
}
function paypalGrossYear() {
  const year = String(state.activeMonth).slice(0,4);
  return sum(state.sideHustles.filter(r => String(r.month_key).startsWith(year)), r => r.gross_amount);
}
function paypalSetAsideYear() {
  const year = String(state.activeMonth).slice(0,4);
  return sum(state.sideHustles.filter(r => String(r.month_key).startsWith(year)), r => r.recommended_set_aside || (Number(r.gross_amount || 0) * Number(r.tax_rate || 30) / 100));
}
function isPlaceholderBill(row) {
  return Number(row.amount || 0) <= 0 && !String(row.due_day || "").trim();
}
function statusClass(status) {
  const s = String(status || "");
  if (["Paid", "Funded"].includes(s)) return "green";
  if (["Partial", "Committed", "Scheduled", "Auto-pay"].includes(s)) return "yellow";
  if (["Review"].includes(s)) return "red";
  return "blue";
}
function statusPill(status) {
  return `<span class="pill ${statusClass(status)}">${escapeHtml(status || "Not Paid")}</span>`;
}
function ownerPill(owner) {
  return `<span class="pill">${escapeHtml(owner || "Unassigned")}</span>`;
}

async function init() {
  const { data } = await client.auth.getSession();
  state.session = data.session;
  if (!state.session) {
    renderLogin();
    return;
  }
  await loadAll();
  renderApp();
}

function renderLogin(message = "") {
  app.innerHTML = `
    <div class="login-wrap">
      <form class="card login-card" id="loginForm">
        <div class="logo">FN</div>
        <h1>FamilyNest</h1>
        <p>Log in to your shared household budget.</p>
        ${message ? `<p class="error">${escapeHtml(message)}</p>` : ""}
        <p id="loginStatus" class="small-muted">Ready to sign in.</p>
        <label>Email <input id="loginEmail" type="email" value="munoz.pat@outlook.com" autocomplete="email"></label>
        <label>Password <input id="loginPassword" type="password" autocomplete="current-password"></label>
        <button id="loginBtn" type="submit">Log in</button>
        <p class="small-muted">Use the Supabase temporary password you created. Alec can use the same screen with his email.</p>
      </form>
    </div>
  `;

  async function doLogin(event) {
    event.preventDefault();

    const btn = document.getElementById("loginBtn");
    const status = document.getElementById("loginStatus");
    const email = document.getElementById("loginEmail").value.trim();
    const password = document.getElementById("loginPassword").value;

    status.textContent = "Signing in…";
    status.className = "small-muted";
    btn.disabled = true;
    btn.textContent = "Signing in…";

    try {
      if (!email || !password) {
        throw new Error("Enter both email and password.");
      }

      const { data, error } = await client.auth.signInWithPassword({ email, password });

      if (error) {
        throw error;
      }

      if (!data.session) {
        throw new Error("Supabase did not return a session. Check the login user and password.");
      }

      status.textContent = "Login worked. Loading household data…";
      status.className = "good";
      state.session = data.session;
      await loadAll();
      renderApp();
    } catch (err) {
      status.textContent = err.message || String(err);
      status.className = "error";
      btn.disabled = false;
      btn.textContent = "Log in";
      console.error("FamilyNest login error:", err);
    }
  }

  document.getElementById("loginForm").addEventListener("submit", doLogin);
}

async function loadAll() {
  const { data: userData } = await client.auth.getUser();
  const userId = userData.user.id;

  const { data: profile, error: profileError } = await client
    .from("profiles")
    .select("id,display_name,email,role,household_id")
    .eq("id", userId)
    .single();
  if (profileError) throw profileError;

  state.profile = profile;
  state.householdId = profile.household_id;

  const [settings, months, budgetLines, transactions, incomeLines, quarterlyIncome, sideHustles, personalLimits, debts, keepAssumptions] = await Promise.all([
    client.from("settings").select("*").eq("household_id", state.householdId).single(),
    client.from("months").select("*").eq("household_id", state.householdId).order("month_key"),
    client.from("budget_lines").select("*").eq("household_id", state.householdId).order("month_key").order("due_day", { nullsFirst: false }),
    client.from("transactions").select("*").eq("household_id", state.householdId).order("transaction_date", { ascending: false }),
    client.from("income_lines").select("*").eq("household_id", state.householdId).order("owner"),
    client.from("quarterly_income").select("*").eq("household_id", state.householdId).order("owner"),
    client.from("side_hustles").select("*").eq("household_id", state.householdId).order("month_key"),
    client.from("personal_money_limits").select("*").eq("household_id", state.householdId).order("owner"),
    client.from("debts").select("*").eq("household_id", state.householdId).order("balance"),
    client.from("keep_assumptions").select("*").eq("household_id", state.householdId)
  ]);

  for (const result of [settings, months, budgetLines, transactions, incomeLines, quarterlyIncome, sideHustles, personalLimits, debts, keepAssumptions]) {
    if (result.error) throw result.error;
  }

  state.settings = settings.data;
  state.activeMonth = settings.data.active_month;
  state.months = months.data || [];
  state.budgetLines = budgetLines.data || [];
  state.transactions = transactions.data || [];
  state.incomeLines = incomeLines.data || [];
  state.quarterlyIncome = quarterlyIncome.data || [];
  state.sideHustles = sideHustles.data || [];
  state.personalLimits = personalLimits.data || [];
  state.debts = debts.data || [];
  state.keepAssumptions = keepAssumptions.data || [];
}

function renderApp() {
  app.innerHTML = `
    <div class="app-shell">
      <header class="header">
        <div class="header-inner">
          <div class="brand-row">
            <div class="brand">
              <div class="logo">FN</div>
              <div>
                <h1>FamilyNest</h1>
                <p>Shared budget for Patricia and Alec</p>
              </div>
            </div>
            <div class="toolbar">
              <label style="min-width:12rem">Month
                <select id="monthSelect">
                  ${state.months.filter(m => m.month_key !== "template").map(m => `<option value="${m.month_key}" ${m.month_key === state.activeMonth ? "selected" : ""}>${escapeHtml(m.label)}</option>`).join("")}
                </select>
              </label>
              <button class="secondary" id="refreshBtn">Refresh</button>
              <button class="ghost" id="logoutBtn">Log out</button>
            </div>
          </div>
          <nav class="nav">
            ${navItems.map(([id, label]) => `<button data-view="${id}" class="${state.activeView === id ? "active" : ""}">${label}</button>`).join("")}
          </nav>
        </div>
      </header>
      <main class="main">
        <div id="view"></div>
      </main>
    </div>
  `;

  document.querySelectorAll("[data-view]").forEach(btn => {
    btn.onclick = () => {
      state.activeView = btn.dataset.view;
      renderApp();
    };
  });

  document.getElementById("monthSelect").onchange = async e => {
    state.activeMonth = e.target.value;
    await client.from("settings").update({ active_month: state.activeMonth }).eq("household_id", state.householdId);
    renderApp();
  };
  document.getElementById("refreshBtn").onclick = async () => {
    await loadAll();
    renderApp();
  };
  document.getElementById("logoutBtn").onclick = async () => {
    await client.auth.signOut();
    state.session = null;
    renderLogin();
  };

  renderCurrentView();
}

function renderCurrentView() {
  const titles = {
    dashboard: ["Dashboard", "The quick pulse check for the selected month."],
    monthly: ["Monthly Plan", "Bills, due dates, status, and remaining amounts."],
    keep: ["Keep in Account", "Temporary safety math before the next paycheck."],
    income: ["Income", "Reliable income, quarterly money, and PayPal side hustles."],
    personal: ["Personal Money", "Guilt-free spending with notes."],
    transactions: ["Transactions", "Imported and reconciled bank lines."],
    debt: ["Debt", "Balances and minimums."]
  };
  const [title, subtitle] = titles[state.activeView] || titles.dashboard;
  document.getElementById("view").innerHTML = `
    <div class="topbar">
      <div>
        <h2>${title}</h2>
        <p>${subtitle}</p>
      </div>
      <p class="small-muted">Logged in as ${escapeHtml(state.profile.display_name)} · ${escapeHtml(monthLabel(state.activeMonth))}</p>
    </div>
    <div id="viewBody" class="grid"></div>
  `;
  const body = document.getElementById("viewBody");
  if (state.activeView === "dashboard") body.innerHTML = dashboardHtml();
  if (state.activeView === "monthly") { body.innerHTML = monthlyHtml(); bindMonthly(); }
  if (state.activeView === "keep") { body.innerHTML = keepHtml(); bindKeep(); }
  if (state.activeView === "income") body.innerHTML = incomeHtml();
  if (state.activeView === "personal") body.innerHTML = personalHtml();
  if (state.activeView === "transactions") body.innerHTML = transactionsHtml();
  if (state.activeView === "debt") body.innerHTML = debtHtml();
}

function metric(label, value, hint, color = "") {
  const n = Number(value || 0);
  const cls = color || (n < 0 ? "red" : "");
  return `<div class="card metric"><div class="label">${label}</div><div class="value ${cls}">${fmt(n)}</div><div class="hint">${hint}</div></div>`;
}

function dashboardHtml() {
  const rel = reliableIncome();
  const qtr = quarterlyIncomeActive();
  const bills = totalPlanBills();
  const personal = personalLimitTotal();
  const breathing = rel + qtr - bills - personal;
  const keep = keepInAccountCalc();
  const paypalGross = paypalGrossMonth();
  const paypalTax = paypalSetAsideMonth();
  const paypalAfter = paypalGross - paypalTax;

  return `
    <section class="cards">
      ${metric("Reliable income", rel + qtr, `Regular income ${fmt(rel)} + quarterly ${fmt(qtr)}.`)}
      ${metric("Planned bills", bills, `${activeBudgetLines().filter(r => !isPlaceholderBill(r)).length} bill lines.`)}
      ${metric("Personal money", personal, `Used ${fmt(personalSpent())}. Left ${fmt(personal - personalSpent())}.`)}
      ${metric("Breathing room", breathing, "After bills and personal money.", breathing < 0 ? "red" : "green")}
    </section>
    <section class="cards">
      ${metric("Keep in account", keep.total, "Bills before next paycheck + prorated flexible money + buffer.")}
      ${metric("PayPal side hustle", paypalGross, `Recommended set aside ${fmt(paypalTax)}. After set aside ${fmt(paypalAfter)}.`)}
      ${metric("PayPal YTD gross", paypalGrossYear(), `YTD recommended set aside ${fmt(paypalSetAsideYear())}.`)}
      ${metric("Transactions", activeTransactions().length, "Imported rows for this month.")}
    </section>
    <section class="card">
      <div class="section-title"><h3>Quick notes</h3><span>Shared database is live</span></div>
      <p class="small-muted">This first shared version reads from Supabase and saves simple bill status and Keep in Account assumptions. CSV import and full editing come next.</p>
    </section>
  `;
}

function dueDayNumbers(value) {
  const matches = String(value || "").match(/\d+/g) || [];
  return matches.map(Number).filter(n => n >= 1 && n <= 31);
}
function keepInAccountCalc() {
  const nextDay = Number(state.settings?.joint_next_deposit_day || 10);
  const buffer = Number(state.settings?.account_safety_buffer || 300);
  const monthBills = activeBudgetLines().filter(b => !["Paid", "Skipped"].includes(b.status));
  const assumed = new Set(state.keepAssumptions.filter(a => a.month_key === state.activeMonth && a.assumed_paid).map(a => a.budget_line_id));
  const dueBills = monthBills.filter(b => {
    if (assumed.has(b.id)) return false;
    const days = dueDayNumbers(b.due_day);
    if (!days.length) return false;
    return days.some(d => d <= nextDay);
  });
  const billTotal = sum(dueBills, b => Math.max(0, Number(b.amount || 0) - Number(b.paid_amount || 0)));

  const flexibleCategories = new Set(["Fuel", "Groceries"]);
  const flexibleMonthly = sum(activeBudgetLines().filter(b => flexibleCategories.has(b.category) && !["Paid", "Skipped"].includes(b.status)), b => Math.max(0, Number(b.amount || 0) - Number(b.paid_amount || 0)));
  const personalMonthly = Math.max(0, personalLimitTotal() - personalSpent());
  const today = new Date().getDate();
  const daysUntil = Math.max(1, nextDay - today + 1);
  const daysInMonth = 31;
  const proratedFlexible = (flexibleMonthly + personalMonthly) * daysUntil / daysInMonth;
  return { total: billTotal + proratedFlexible + buffer, billTotal, proratedFlexible, buffer, dueBills, assumed };
}

function monthlyHtml() {
  const rows = activeBudgetLines().filter(r => !isPlaceholderBill(r)).sort((a,b) => (dueDayNumbers(a.due_day)[0] || 99) - (dueDayNumbers(b.due_day)[0] || 99));

    <section class="card desktop-table-mobile-cards">
      <div class="section-title"><h3>${monthLabel(state.activeMonth)} bills</h3><span>${rows.length} lines</span></div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Owner</th><th>Day</th><th>Payee</th><th>Category</th><th>Status</th><th class="money">Amount</th><th class="money">Paid</th><th class="money">Remaining</th><th>Update</th></tr></thead>
          <tbody>
            ${rows.map(row => `
              <tr>
                <td>${ownerPill(row.owner)}</td>
                <td>${escapeHtml(row.due_day || "")}</td>
                <td><strong>${escapeHtml(row.payee)}</strong><div class="small-muted">${escapeHtml(row.notes || "")}</div></td>
                <td>${escapeHtml(row.category)}</td>
                <td>${statusPill(row.status)}</td>
                <td class="money">${fmt(row.amount)}</td>
                <td class="money">${fmt(row.paid_amount)}</td>
                <td class="money">${fmt(Math.max(0, Number(row.amount || 0) - Number(row.paid_amount || 0)))}</td>
                <td>
                  <select data-status="${row.id}">
                    ${["Not Paid","Scheduled","Committed","Partial","Paid","Skipped","Review"].map(s => `<option value="${s}" ${s === row.status ? "selected" : ""}>${s}</option>`).join("")}
                  </select>
                </td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      </div>
      <div class="mobile-card-list">
        ${rows.map(row => `
          <div class="bill-card">
            <div class="top"><h4>${escapeHtml(row.payee)}</h4>${statusPill(row.status)}</div>
            <p>${escapeHtml(row.owner)} · Day ${escapeHtml(row.due_day || "?")} · ${escapeHtml(row.category)}</p>
            <strong>${fmt(row.amount)} · Paid ${fmt(row.paid_amount)}</strong>
            <select data-status="${row.id}">
              ${["Not Paid","Scheduled","Committed","Partial","Paid","Skipped","Review"].map(s => `<option value="${s}" ${s === row.status ? "selected" : ""}>${s}</option>`).join("")}
            </select>
          </div>
        `).join("")}

}

function bindMonthly() {
  document.querySelectorAll("[data-status]").forEach(select => {
    select.onchange = async () => {
      const id = select.dataset.status;
      const status = select.value;
      const row = state.budgetLines.find(r => r.id === id);
      const paidAmount = status === "Paid" ? Number(row.amount || 0) : Number(row.paid_amount || 0);
      const { error } = await client.from("budget_lines").update({ status, paid_amount: paidAmount }).eq("id", id);
      if (error) alert(error.message);
      await loadAll();
      renderApp();
    };
  });
}

function keepHtml() {
  const calc = keepInAccountCalc();
  const activeAssumptions = state.keepAssumptions.filter(a => a.month_key === state.activeMonth && a.assumed_paid);
  const candidateRows = activeBudgetLines()
    .filter(b => !["Paid", "Skipped"].includes(b.status) && dueDayNumbers(b.due_day).length)
    .sort((a,b) => (dueDayNumbers(a.due_day)[0] || 99) - (dueDayNumbers(b.due_day)[0] || 99));

  return `
    <section class="cards">
      ${metric("Keep in account", calc.total, "Temporary safety amount before next paycheck.")}
      ${metric("Bills included", calc.billTotal, `${calc.dueBills.length} unpaid due-soon bills counted.`)}
      ${metric("Prorated flexible", calc.proratedFlexible, "Fuel, groceries, and personal money slice.")}
      ${metric("Buffer", calc.buffer, "Safety cushion.")}
    </section>
    <section class="card">
      <div class="section-title"><h3>Settings</h3><span>Saved to Supabase</span></div>
      <div class="form-grid">
        <label>Next paycheck day <input id="nextDepositDay" type="number" min="1" max="31" value="${escapeHtml(state.settings?.joint_next_deposit_day || 10)}"></label>
        <label>Buffer <input id="bufferAmount" type="number" step="0.01" value="${escapeHtml(state.settings?.account_safety_buffer || 300)}"></label>
        <button id="saveKeepSettings">Save settings</button>
      </div>
    </section>
    <section class="card desktop-table-mobile-cards">
      <div class="section-title"><h3>Assume paid for this calculation only</h3><span>${activeAssumptions.length} selected</span></div>
      <p class="small-muted">This does not mark the real bill paid. It only removes it from Keep in Account while you wait for the transaction to import or reconcile.</p>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Assume paid?</th><th>Bill</th><th>Day</th><th>Status</th><th class="money">Remaining</th></tr></thead>
          <tbody>
            ${candidateRows.map(row => `
              <tr>
                <td><input type="checkbox" data-assume="${row.id}" ${calc.assumed.has(row.id) ? "checked" : ""}></td>
                <td><strong>${escapeHtml(row.payee)}</strong><div class="small-muted">${escapeHtml(row.owner)}</div></td>
                <td>${escapeHtml(row.due_day || "")}</td>
                <td>${statusPill(row.status)}</td>
                <td class="money">${fmt(Math.max(0, Number(row.amount || 0) - Number(row.paid_amount || 0)))}</td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      </div>
      <div class="mobile-card-list">
        ${candidateRows.map(row => `
          <label class="bill-card">
            <div class="top"><h4>${escapeHtml(row.payee)}</h4><input type="checkbox" data-assume="${row.id}" ${calc.assumed.has(row.id) ? "checked" : ""}></div>
            <p>${escapeHtml(row.owner)} · Day ${escapeHtml(row.due_day || "?")} · ${statusPill(row.status)}</p>
            <strong>${fmt(Math.max(0, Number(row.amount || 0) - Number(row.paid_amount || 0)))}</strong>
          </label>
        `).join("")}
      </div>
    </section>
  `;
}

function bindKeep() {
  document.getElementById("saveKeepSettings").onclick = async () => {
    const joint_next_deposit_day = document.getElementById("nextDepositDay").value;
    const account_safety_buffer = Number(document.getElementById("bufferAmount").value || 0);
    const { error } = await client.from("settings").update({ joint_next_deposit_day, account_safety_buffer }).eq("household_id", state.householdId);
    if (error) alert(error.message);
    await loadAll();
    renderApp();
  };
  document.querySelectorAll("[data-assume]").forEach(chk => {
    chk.onchange = async () => {
      const budgetLineId = chk.dataset.assume;
      if (chk.checked) {
        const { error } = await client.from("keep_assumptions").upsert({
          household_id: state.householdId,
          month_key: state.activeMonth,
          budget_line_id: budgetLineId,
          assumed_paid: true,
          assumed_by: state.profile.id
        }, { onConflict: "household_id,month_key,budget_line_id" });
        if (error) alert(error.message);
      } else {
        const { error } = await client.from("keep_assumptions")
          .delete()
          .eq("household_id", state.householdId)
          .eq("month_key", state.activeMonth)
          .eq("budget_line_id", budgetLineId);
        if (error) alert(error.message);
      }
      await loadAll();
      renderApp();
    };
  });
}

function incomeHtml() {
  const qActive = state.quarterlyIncome.filter(r => r.active !== false && isQuarterlyActive(r));
  const monthPaypal = paypalGrossMonth();
  return `
    <section class="cards">
      ${metric("Reliable monthly", reliableIncome(), `${state.incomeLines.length} income lines.`)}
      ${metric("Quarterly active", quarterlyIncomeActive(), `${qActive.length} line included this month.`)}
      ${metric("PayPal side hustle", monthPaypal, `Recommended set aside ${fmt(paypalSetAsideMonth())}.`)}
      ${metric("PayPal YTD", paypalGrossYear(), `YTD set aside ${fmt(paypalSetAsideYear())}.`)}
    </section>
    <section class="split">
      <div class="card">
        <div class="section-title"><h3>Reliable income</h3><span>Counts every month</span></div>
        ${simpleTable(["Owner","Type","Monthly","Notes"], state.incomeLines.map(r => [r.owner, r.income_type, fmt(r.monthly_amount), r.notes || ""]))}
      </div>
      <div class="card">
        <div class="section-title"><h3>Quarterly money</h3><span>Only matching months</span></div>
        ${simpleTable(["Owner","Label","Months","Amount"], state.quarterlyIncome.map(r => [r.owner, r.label, r.months_counted, fmt(r.amount)]))}
      </div>
    </section>
    <section class="card">
      <div class="section-title"><h3>PayPal side hustle month by month</h3><span>30% set aside</span></div>
      ${sideHustleMonthlyTable()}
    </section>
  `;
}

function sideHustleMonthlyTable() {
  const groups = {};
  state.sideHustles.forEach(row => {
    groups[row.month_key] ||= { gross:0, tax:0 };
    groups[row.month_key].gross += Number(row.gross_amount || 0);
    groups[row.month_key].tax += Number(row.recommended_set_aside || 0);
  });
  const rows = Object.entries(groups).sort();
  return simpleTable(["Month","Gross","Recommended set aside","After set aside"], rows.map(([month, g]) => [monthLabel(month), fmt(g.gross), fmt(g.tax), fmt(g.gross - g.tax)]));
}

function personalHtml() {
  const limits = state.personalLimits.filter(r => r.month_key === state.activeMonth);
  const personalTx = activeTransactions().filter(t => t.category === "Personal" && t.reconciled);
  return `
    <section class="cards">
      ${limits.map(l => metric(`${l.owner} limit`, l.monthly_limit, `Used ${fmt(personalSpent(l.owner))}. Left ${fmt(Number(l.monthly_limit || 0) - personalSpent(l.owner))}.`)).join("")}
    </section>
    <section class="card">
      <div class="section-title"><h3>Personal spending notes</h3><span>${personalTx.length} rows</span></div>
      ${simpleTable(["Date","Owner","Description","Amount","Note"], personalTx.map(t => [t.transaction_date, t.owner, t.description, fmt(Math.abs(t.amount)), t.notes || ""]))}
    </section>
  `;
}

function transactionsHtml() {
  const rows = activeTransactions();
  return `
    <section class="card">
      <div class="section-title"><h3>Transactions</h3><span>${rows.length} rows for ${monthLabel(state.activeMonth)}</span></div>
      ${simpleTable(["Date","Description","Amount","Category","Owner","Reconciled","Notes"], rows.map(t => [t.transaction_date, t.description, fmt(t.amount), t.category, t.owner || "", t.reconciled ? "Yes" : "No", t.notes || ""]))}
    </section>
  `;
}

function debtHtml() {
  const active = state.debts.filter(d => d.status === "Active");
  return `
    <section class="cards">
      ${metric("Debt total", sum(active, d => d.balance), `${active.length} active debts.`)}
      ${metric("Minimums", sum(active, d => d.minimum_payment), "Monthly minimum payments.")}
    </section>
    <section class="card">
      <div class="section-title"><h3>Debt tracker</h3><span>Imported from backup</span></div>
      ${simpleTable(["Debt","Owner","Balance","Minimum","APR / Promo"], active.map(d => [
        d.name,
        d.owner,
        fmt(d.balance),
        fmt(d.minimum_payment),
        d.promo_end_date ? `0% promo until ${d.promo_end_date}` : (d.interest_rate ? `${d.interest_rate}%` : "Add APR")
      ]))}
    </section>
  `;
}

function simpleTable(headers, rows) {
  if (!rows.length) return `<div class="empty">No data yet.</div>`;
  return `
    <div class="table-wrap">
      <table>
        <thead><tr>${headers.map(h => `<th>${escapeHtml(h)}</th>`).join("")}</tr></thead>
        <tbody>
          ${rows.map(row => `<tr>${row.map((cell, i) => `<td class="${String(cell).startsWith("$") ? "money" : ""}">${escapeHtml(cell)}</td>`).join("")}</tr>`).join("")}
        </tbody>
      </table>
    </div>
  `;
}

init().catch(err => {
  console.error(err);
  app.innerHTML = `<div class="login-wrap"><div class="card"><h1>FamilyNest error</h1><p class="error">${escapeHtml(err.message || err)}</p></div></div>`;
});

  </script>
